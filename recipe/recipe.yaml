schema_version: 1

context:
  version: "0.0.10"
  python_min: "3.10"

package:
  name: vmec-jax
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/v/vmec-jax/vmec_jax-${{ version }}.tar.gz
  sha256: 9d9a6b6303cde12a2e57cd4f00a4a047aaa1070368b013a9c64c364699d728d2

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - vmec_jax = vmec_jax.cli:main
      - xvmec_jax = vmec_jax.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=68
    - pip
  run:
    - python >=${{ python_min }}
    - numpy
    - jax
    - netcdf4
    # python < 3.11
    - tomli

tests:
  - python:
      imports:
        - vmec_jax
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - vmec_jax --help
      - xvmec_jax --help

about:
  summary: End-to-end differentiable JAX implementation of VMEC2000 for fixed and free-boundary equilibria
  license: MIT
  license_file: LICENSE
  homepage: https://vmec-jax.readthedocs.io/
  repository: https://github.com/uwplasma/vmec_jax
  documentation: https://vmec-jax.readthedocs.io/

extra:
  recipe-maintainers:
    - rogeriojorge
    - matthewfeickert
